<!DOCTYPE html>
<html lang="en">
    <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Play</title></head>
    <body style="margin:0;">
        <!-- the cover thingy -->
         <button onclick="playNow()" id="Button" style="z-index:2;width:100%;height:100vh;padding:0;border:none;cursor:pointer;">
            <div style="width:100%;height:100vh;display:flex;justify-content:center;align-items:center;color:white;background-color:#323232;font-size:25px;">
                <span>Click to play now</span>
            </div>
        </button>

        <!-- main content -->
        <iframe id="IFrame" name="iframe" src="https://client.eaglercraft.win/eagler-files/1.8/Main/index.html" style="z-index:0;display:none;top:0;margin:0%;padding:0%;width:100%;height:100vh;" frameborder="0"></iframe>
        <span style="position:absolute;bottom:5px;right:5px;">
            <button title="Enter Fullscreen" id="toggleFullscreen" style="width:28px;height:28px;cursor:pointer;border-radius:5px;border:none;background-color:#2b2b2b;text-align:center;display:none;justify-content:center;align-items:center;z-index:1;"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="24px" fill="#CCCCCC"><path d="M120-120v-200h80v120h120v80H120Zm520 0v-80h120v-120h80v200H640ZM120-640v-200h200v80H200v120h-80Zm640 0v-120H640v-80h200v200h-80Z"/></svg></button>
        </span>



        <script>
            function playNow() {
                document.getElementById("Button").style.display = "none";

                document.getElementById("IFrame").style.display = "block";
                document.getElementById("toggleFullscreen").style.display = "flex";
            } document.getElementById("IFrame").addEventListener("click", playNow);


        document.getElementById('toggleFullscreen').addEventListener('click', function() {
            const iframe = document.getElementById('IFrame');

            if (!document.fullscreenElement) {

                iframe.requestFullscreen()
                    .catch(err => {
                        console.error(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
                    });
            } else {

                document.exitFullscreen();
            }
        });
        </script>
    </body>
</html>
